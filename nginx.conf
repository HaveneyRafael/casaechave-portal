server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # =============================================
    # SECURITY HEADERS
    # =============================================

    # Content-Security-Policy — Restringe origens de scripts, estilos e recursos
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://*.supabase.co https://ui-avatars.com data: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me;" always;

    # Previne clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Previne MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (desabilita recursos desnecessários)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # =============================================
    # PERFORMANCE
    # =============================================

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache de arquivos estáticos
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
